name: ubuntu-desktop-help
base: core26
build-base: devel
version: '0.4.2'
summary: AI-powered Ubuntu Desktop help app
description: |
  An interactive CLI tool that answers questions about Ubuntu
  using local documentation and a large language model. Supports both
  a local Ollama backend and the GitHub Copilot / GitHub Models API.

  A pre-built documentation index (index.lance) must be provided at runtime.
  Set UBUNTU_HELP_INDEX_PATH to its location, or place it at
  $SNAP_USER_DATA/index.lance. Generate it with the ubuntu-docs-indexer tool.

grade: devel
confinement: strict

apps:
  ubuntu-desktop-help:
    command: bin/ubuntu-desktop-help
    plugs:
      - network          # Ollama / Copilot API calls
      - home             # reading config/token files under $HOME
      - secret-service   # GNOME Keyring / KWallet for gh:github.com token
      - desktop          # GTK4 display access
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  ubuntu-desktop-help:
    plugin: rust
    source: .
    build-packages:
      - pkg-config
      - libssl-dev
      - libgtk-4-dev
      - libadwaita-1-dev
      - protobuf-compiler  # required by lance-encoding (transitive LanceDB dep)
      - libprotobuf-dev    # provides google/protobuf/*.proto well-known types for protoc
    stage-packages:
      - libssl3t64
      - ca-certificates
      - libgtk-4-1
      - libadwaita-1-0
      - libglib2.0-0t64
      - libcairo2
      - libpango-1.0-0
      - libgdk-pixbuf-2.0-0
