name: ubuntu-desktop-help
base: core26
build-base: devel
version: '0.5.4'
summary: AI-powered Ubuntu Desktop help app
description: |
  An interactive CLI tool that answers questions about Ubuntu
  using local documentation and a large language model. Supports both
  a local Ollama backend and the GitHub Copilot / GitHub Models API.

  A pre-built documentation index (index.lance) is downloaded from the latest
  GitHub release during snap build and copied to writable storage on install.
  To use a custom index, place it at $SNAP_USER_DATA/index.lance.

grade: devel
confinement: strict

apps:
  ubuntu-desktop-help:
    command: usr/bin/ubuntu-desktop-help
    environment:
      UBUNTU_HELP_INDEX_PATH: $SNAP_COMMON/index.lance
    plugs:
      - network          # Ollama / Copilot API calls
      - home             # reading config/token files under $HOME
      - password-manager-service  # GNOME Keyring / KWallet for gh:github.com token
      - desktop          # GTK4 display access
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  ubuntu-desktop-help:
    plugin: rust
    source: .
    build-packages:
      - g++               # provides libstdc++ required by LanceDB/ORT native deps
      - pkg-config
      - libssl-dev
      - libgtk-4-dev
      - libadwaita-1-dev
      - protobuf-compiler  # required by lance-encoding (transitive LanceDB dep)
      - libprotobuf-dev    # provides google/protobuf/*.proto well-known types for protoc
    stage-packages:
      - libssl3t64
      - ca-certificates
      - libgtk-4-1
      - libadwaita-1-0
      - libglib2.0-0t64
      - libcairo2
      - libpango-1.0-0
      - libgdk-pixbuf-2.0-0

  rag-index:
    # Downloads the pre-built documentation index from the latest GitHub release
    # and stages it at $SNAP/index.lance for runtime use.
    # To use a different repository, override INDEX_REPO_URL at build time:
    #   snapcraft --build-environment-variable INDEX_REPO_URL=https://github.com/other/repo
    plugin: nil
    build-packages:
      - curl
    build-environment:
      - INDEX_REPO_URL: "https://github.com/msuchane/hackathon-desktop-help"
    override-build: |
      curl -fsSL \
        "${INDEX_REPO_URL}/releases/latest/download/index.lance.tar.gz" \
        -o index.lance.tar.gz
      tar --no-same-owner -xzf index.lance.tar.gz
      mkdir -p target
      mv index.lance target/index.lance
    organize:
      target/index.lance: index.lance
